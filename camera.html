<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>iPad対応 リアルタイム画像認識</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>

<h2>カメラでリアルタイム画像認識（iPad対応）</h2>

<button id="startBtn">カメラ開始</button>
<br><br>

<video id="video" width="300" height="225" playsinline></video>
<p id="result">結果：</p>

<script>
let model;
const video = document.getElementById("video");

// カメラ起動（iPad対応）
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }, // 背面カメラ
        audio: false
    });
    video.srcObject = stream;

    await video.play(); // ← iPadで必須
}

// モデル読み込み
async function loadModel() {
    model = await mobilenet.load();
    console.log("モデル読み込み完了");
}

// 認識処理（軽量化）
async function detect() {
    if (!model) return;

    const predictions = await model.classify(video);
    const best = predictions[0];

    document.getElementById("result").innerHTML =
        `${best.className} (${(best.probability * 100).toFixed(1)}%)`;

    setTimeout(detect, 300); // ← iPadはこれ重要（軽くする）
}

// ボタンで開始（← iPad必須）
document.getElementById("startBtn").addEventListener("click", async () => {
    await setupCamera();
    await loadModel();
    detect();
});
</script>

</body>
</html>
